spring.application.name=Genderize
server.port=8080

# ===============================
# DATABASE (Railway)
# ===============================
spring.datasource.url=jdbc:${DB_URL}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# JACKSON (ISO 8601 UTC)
# ===============================
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.com.app=TRACE


# ===============================
# PROFILE
# ===============================
genderize-base-url=https://api.genderize.io?name=%s
agify-base-url=https://api.agify.io?name=%s
nationalize-base-url=https://api.nationalize.io?name=%s
# ===============================
# GITHUB
# ===============================
github-base-url=https://github.com/login/oauth/
github-client-id=${GITHUB_CLIENT_ID}
github-client-secret=${GITHUB_CLIENT_SECRET}
github-token-url=${github-base-url}access_token
github-user-url=https://api.github.com/user
github-authorize-url=${github-base-url}authorize
github-redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:8080/auth/github-callback}
web-success-redirect-url=${WEB_SUCCESS_REDIRECT_URL:http://localhost:5173/dashboard}
web-failure-redirect-url=${WEB_FAILURE_REDIRECT_URL:http://localhost:5173/login}
cookie-secure=${COOKIE_SECURE:true}

# ===============================
# JWT
# ===============================
jwt-secret=${JWT_SECRET}
